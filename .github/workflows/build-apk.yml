name: Build APK

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (without v prefix, e.g. 0.1.1)'
        required: false

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Restore Android keystore
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing"; exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          test -s android/app/release.keystore

      - name: Restore google-services.json (optional — enables FCM)
        id: fcm
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "google-services.json installed ($(wc -c < android/app/google-services.json) bytes)"
            echo "has_fcm=true" >> "$GITHUB_OUTPUT"
          else
            echo "GOOGLE_SERVICES_JSON secret is not set — building without FCM. The Firebase gradle plugin will skip apply; the Vue Settings toggle will render disabled with a 'not supported in this build' label (see isPushSupportedByBuild in usePushNotifications.ts)."
            echo "has_fcm=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        run: npm ci

      - name: Build web
        env:
          VITE_HAS_FCM: ${{ steps.fcm.outputs.has_fcm }}
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - name: Resolve version
        id: v
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          # versionCode must monotonically increase; derive from run number
          # (unique per repo). Play Store requires it to grow every upload.
          echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Building version $V (code=${{ github.run_number }})"

      - name: Build release APK
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_pmVersionName: ${{ steps.v.outputs.version }}
          ORG_GRADLE_PROJECT_pmVersionCode: ${{ steps.v.outputs.version_code }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Stage APK artifacts
        run: |
          V="${{ steps.v.outputs.version }}"
          mkdir -p out
          cp android/app/build/outputs/apk/release/app-release.apk "out/physicalme-${V}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk out/physicalme-latest.apk
          ls -lh out/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: physicalme-${{ steps.v.outputs.version }}
          path: out/*.apk
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
